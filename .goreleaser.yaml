version: 2

project_name: depscan

before:
  hooks:
    - go mod tidy

builds:
  - id: depscan
    main: ./cmd/depscan
    binary: depscan
    env:
      - CGO_ENABLED=0 # fully static binary, no libc dependency
    flags:
      - -trimpath # reproducible builds: strip local filesystem paths
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}" # deterministic timestamps

archives:
  - id: depscan
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^style:"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  # Draft-first: required for GitHub immutable releases. GoReleaser uploads all
  # assets to a draft, then the workflow publishes it (publishing locks assets).
  draft: true
  prerelease: auto
